name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check app.py api.py main.py predict_customer.py save_processed_data.py apps src tests pages

      - name: Black check
        run: black --check app.py api.py main.py predict_customer.py save_processed_data.py apps src tests pages

      - name: Run tests
        run: pytest -q
